$schema: "https://json-schema.org/draft/2020-12/schema"
title: Lifecycle Mode Contract
type: object
required:
  - mode
  - role_name
  - mission
  - allowed_inputs
  - required_outputs
  - hard_rules
  - failure_conditions
  - evidence_requirements
  - never_do
  - valid_handoff_targets
properties:
  mode:
    $ref: "#/$defs/lifecycle_mode"
  role_name:
    type: string
    minLength: 1
    pattern: "\\S"
  mission:
    type: string
    minLength: 1
    pattern: "\\S"
  allowed_inputs:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      type: string
      minLength: 1
      pattern: "\\S"
  required_outputs:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      type: string
      minLength: 1
      pattern: "\\S"
  hard_rules:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      type: string
      minLength: 1
      pattern: "\\S"
  failure_conditions:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      type: string
      minLength: 1
      pattern: "\\S"
  evidence_requirements:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      type: string
      minLength: 1
      pattern: "\\S"
  never_do:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      type: string
      minLength: 1
      pattern: "\\S"
  valid_handoff_targets:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      $ref: "#/$defs/lifecycle_mode"
additionalProperties: false
$defs:
  lifecycle_mode:
    type: string
    enum:
      - prototyper
      - builder
      - sweeper
      - grower
      - maintainer
