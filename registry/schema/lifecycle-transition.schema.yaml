$schema: "https://json-schema.org/draft/2020-12/schema"
title: Lifecycle Transition Gate
type: object
required:
  - from_mode
  - to_mode
  - allowed_when
  - required_evidence
properties:
  from_mode:
    $ref: "#/$defs/lifecycle_mode"
  to_mode:
    $ref: "#/$defs/lifecycle_mode"
  allowed_when:
    type: array
    minItems: 1
    items:
      type: string
      minLength: 1
  required_evidence:
    type: array
    minItems: 1
    items:
      type: string
      minLength: 1
  approval_required:
    type: boolean
    default: false
  validation_plan:
    type: array
    items:
      type: string
      minLength: 1
additionalProperties: false
$defs:
  lifecycle_mode:
    type: string
    enum:
      - prototyper
      - builder
      - sweeper
      - grower
      - maintainer

